apiVersion: apps/v1
kind: Deployment
metadata:
    name: finaltest35-admin-backend-test-frontend
spec:
    replicas: 1
    selector:
        matchLabels:
            app: finaltest35-admin-backend-test-frontend
    template:
        metadata:
            labels:
                app: finaltest35-admin-backend-test-frontend
        spec:
            imagePullSecrets:
                - name: dockerhub-secret
            containers:
                - name: finaltest35-admin-backend-test-frontend
                    image: devopspaxarisglobalrepo/finaltest35-admin-backend-test-frontend:latest
                    imagePullPolicy: Always
                    ports:
                        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
    name: finaltest35-admin-backend-test-frontend
spec:
    selector:
        app: finaltest35-admin-backend-test-frontend
    ports:
        - port: 80
            targetPort: 80
    type: ClusterIP
