name: CI + Docker Hub + Trigger Central CD

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate-docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker build (frontend)
        run: |
          docker build -f frontend/Dockerfile -t local/frontend:${{ github.sha }} frontend

  publish-dockerhub:
    needs: validate-docker-build
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        run: |
          echo "IMAGE_NAME=${{ env.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-frontend" >> "$GITHUB_ENV"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (frontend)
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  trigger-central-workflow:
    needs: publish-dockerhub
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    env:
      GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
    steps:
      - name: Build normalized repo slug
        run: |
          REPO_SLUG="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')"
          echo "REPO_SLUG=${REPO_SLUG}" >> "$GITHUB_ENV"

      - name: Check central trigger token
        id: token_check
        run: |
          if [ -z "$GH_ACCESS_TOKEN" ]; then
            echo "should_trigger=false" >> "$GITHUB_OUTPUT"
            echo "GH_ACCESS_TOKEN is missing; skipping central workflow trigger."
          else
            echo "should_trigger=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Central Workflow
        if: ${{ steps.token_check.outputs.should_trigger == 'true' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ env.GH_ACCESS_TOKEN }}
          repository: paxaris-global/paxo
          event-type: build-image
          client-payload: |
            {
              "repo": "${{ env.REPO_SLUG }}",
              "repo_full_name": "${{ github.repository }}",
              "ref_name": "${{ github.ref_name }}",
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "service": "frontend"
            }

      - name: Central workflow trigger skipped
        if: ${{ steps.token_check.outputs.should_trigger != 'true' }}
        run: echo "Central CD trigger skipped because GH_ACCESS_TOKEN is not configured."
